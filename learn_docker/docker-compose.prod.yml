# 生产环境 Docker Compose 配置
# 使用方法: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

version: '3.8'

services:
  app:
    # 生产环境配置覆盖
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx256m -Xms128m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    
    # 生产环境端口映射
    ports:
      - "80:8080"
    
    # 生产环境资源限制（严格控制）
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      # 副本数（可扩展）
      replicas: 1
    
    # 生产环境重启策略
    restart: always
    
    # 生产环境健康检查（保守策略）
    healthcheck:
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s
    
    # 生产环境日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 生产环境安全配置
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    
    # 用户权限（非root用户）
    user: "1000:1000"