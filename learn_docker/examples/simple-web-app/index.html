<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker 学习示例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .info {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .command {
            background: #2d3748;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐳 Docker 学习示例</h1>

        <div class="info">
            <h2>恭喜!</h2>
            <p>你已经成功运行了第一个容器化的 Web 应用!</p>
        </div>

        <div class="info">
            <h3>📚 你学到了什么?</h3>
            <ul>
                <li>如何编写简单的 Dockerfile</li>
                <li>如何构建 Docker 镜像</li>
                <li>如何运行容器并映射端口</li>
                <li>如何访问容器化的应用</li>
            </ul>
        </div>

        <div class="info">
            <h3>🚀 快速开始</h3>
            <div class="command">
                # 构建镜像<br>
                docker build -t my-web-app .<br><br>
                # 运行容器<br>
                docker run -d -p 8080:80 my-web-app<br><br>
                # 访问应用<br>
                http://localhost:8080
            </div>
        </div>

        <div class="info">
            <h3>🎯 下一步</h3>
            <p>尝试修改这个 HTML 文件,重新构建镜像并运行,观察变化!</p>
        </div>
    </div>
</body>
</html>
